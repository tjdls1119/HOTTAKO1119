<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HOT&TAKO1119</title>

  <style>
    :root{
      --bg:#070809;
      --card:#1c1d20;
      --line:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.70);
      --accent:#ff4d4d;
      --shadow:0 14px 38px rgba(0,0,0,.45);
      --radius:18px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 560px at 50% 0%, rgba(255,77,77,.22), transparent 60%),
        linear-gradient(#0a0b0d, #050607 40%, #050607);
    }

    header{
      background: var(--accent);
      color:#fff;
      padding: 18px 16px;
      font-weight: 950;
      letter-spacing: .5px;
    }
    .header-inner{
      max-width: 1100px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size: 22px;
    }

    .wrap{ max-width: 1100px; margin:0 auto; padding: 26px 16px 80px; }
    .subtitle{
      text-align:center;
      font-weight: 850;
      color: rgba(255,255,255,.88);
      margin: 12px 0 18px;
      letter-spacing:.2px;
    }

    /* ✅ 탭 4개 */
    .tabs{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 14px;
      margin: 10px 0 18px;
    }
    .tab{
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      padding: 16px 14px;
      min-height: 86px;
      cursor:pointer;
      user-select:none;
      transition: transform .08s ease, background .12s ease, border-color .12s ease;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      text-align:center;
    }
    .tab:hover{ transform: translateY(-1px); }
    .tab .emoji{ font-size: 20px; }
    .tab .name{ font-weight: 950; }
    .tab .hint{ font-size: 12px; color: var(--muted); }

    .tab.active{
      border-color: rgba(255,77,77,.65);
      background: linear-gradient(180deg, rgba(255,77,77,.22), rgba(255,255,255,.03));
    }

    /* ✅ 가격표 패널 */
    .panel{
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.05);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .panel-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 12px;
    }
    .panel-head h2{
      margin:0;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: .2px;
    }
    .panel-head .sub{
      font-size: 12px;
      color: var(--muted);
      text-align:right;
      line-height: 1.4;
      white-space: nowrap;
    }

    .price-list{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding: 12px 12px;
      border-radius: 14px;
      background: rgba(0,0,0,.20);
      border: 1px solid rgba(255,255,255,.10);
    }
    .left{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width: 0;
    }
    .item{
      font-weight: 900;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      max-width: 62vw;
    }
    .desc{
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }
    .price{
      font-weight: 950;
      white-space: nowrap;
      letter-spacing:.2px;
    }

    .note{
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 820px){
      .tabs{ grid-template-columns: 1fr 1fr; }
      .panel-head{ flex-direction:column; align-items:flex-start; }
      .panel-head .sub{ text-align:left; white-space: normal; }
      .item{ max-width: 72vw; }
    }
    @media (max-width: 480px){
      .tabs{ grid-template-columns: 1fr; }
      .header-inner{ font-size: 20px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">🔥 HOT&TAKO1119</div>
  </header>

  <div class="wrap">
    <div class="subtitle">타코야끼 · 핫도그 · 커피&음료 · 세트</div>

    <!-- ✅ 탭 4개 -->
    <div class="tabs" role="tablist" aria-label="메뉴 탭">
      <div class="tab active" data-tab="hotdog" role="tab" aria-selected="true">
        <div class="emoji">🌭</div>
        <div class="name">핫도그</div>
        <div class="hint">눌러서 가격 보기</div>
      </div>

      <div class="tab" data-tab="tako" role="tab" aria-selected="false">
        <div class="emoji">🍡</div>
        <div class="name">타코야끼</div>
        <div class="hint">눌러서 가격 보기</div>
      </div>

      <div class="tab" data-tab="drink" role="tab" aria-selected="false">
        <div class="emoji">☕</div>
        <div class="name">커피·음료</div>
        <div class="hint">눌러서 가격 보기</div>
      </div>

      <div class="tab" data-tab="set" role="tab" aria-selected="false">
        <div class="emoji">🎁</div>
        <div class="name">세트메뉴</div>
        <div class="hint">눌러서 가격 보기</div>
      </div>
    </div>

    <div class="panel" id="panel"></div>
  </div>

  <script>
    // ✅ 메뉴판 이미지 기준 반영(가격/구성)
    const MENU = {
      hotdog: {
        title: "🌭 아메리칸 핫도그",
        subtitle: "주문 즉시 조리",
        items: [
          { name: "클래식 핫도그", desc: "", price: "5,000원" },
          { name: "갈릭 핫도그", desc: "", price: "5,500원" },
          { name: "어니언 핫도그", desc: "", price: "5,500원" },
          { name: "에그 핫도그", desc: "", price: "5,500원" },
          { name: "베이컨 칠리 핫도그", desc: "", price: "6,000원" },
          { name: "바베큐 칠리 핫도그", desc: "", price: "6,000원" },
          { name: "스파이시 칠리 핫도그", desc: "", price: "6,000원" },
        ],
        note: "※ 재료 소진 시 조기 마감될 수 있어요."
      },

      tako: {
        title: "🍡 수제 타코야끼",
        subtitle: "조리시간 15~20초 소요",
        items: [
          { name: "오리지널", desc: "8알 / 12알 / 20알", price: "5,000 / 7,000 / 12,000원" },
          { name: "매콤", desc: "8알 / 12알 / 20알", price: "5,000 / 7,000 / 12,000원" },
          { name: "갈릭", desc: "8알 / 12알 / 20알", price: "5,500 / 7,500 / 13,000원" },
          { name: "와사비마요", desc: "8알 / 12알 / 20알", price: "5,500 / 7,500 / 13,000원" },
          { name: "불난마요", desc: "8알 / 12알 / 20알", price: "5,500 / 7,500 / 13,000원" },
          { name: "스위트칠리", desc: "8알 / 12알 / 20알", price: "5,500 / 7,500 / 13,000원" },
          { name: "불닭", desc: "8알 / 12알 / 20알", price: "5,500 / 7,500 / 13,000원" },
          { name: "불닭볶음면", desc: "컵 / 비조리", price: "2,000원" },
          { name: "까르보 불닭볶음면", desc: "컵 / 비조리", price: "2,000원" },
        ],
        note: "※ 조리시간이 있어요(15~20초). 바쁠 땐 조금만 기다려주세요!"
      },

      drink: {
        title: "☕ 커피 & 음료",
        subtitle: "HOT / ICE",
        items: [
          { name: "아메리카노", desc: "HOT 2,500 / ICE 2,500", price: "" },
          { name: "헤이즐넛 아메리카노", desc: "HOT 2,700 / ICE 3,000", price: "" },
          { name: "카페라떼", desc: "HOT 3,000 / ICE 3,300", price: "" },
          { name: "바닐라라떼", desc: "HOT 3,500 / ICE 3,800", price: "" },

          { name: "아이스티", desc: "", price: "3,500원" },
          { name: "딸기라떼", desc: "", price: "4,000원" },
          { name: "초코라떼", desc: "", price: "4,000원" },
          { name: "자몽/레몬/청포도 에이드", desc: "", price: "4,500원" },

          { name: "블루베리 요거트", desc: "", price: "4,800원" },
          { name: "딸기 / 망고 요거트", desc: "", price: "4,800원" },

          { name: "자몽차 / 유자차", desc: "HOT 3,500 / ICE 4,000", price: "" },
          { name: "캐모마일", desc: "HOT 3,000 / ICE 3,500", price: "" },
          { name: "페퍼민트", desc: "HOT 3,000 / ICE 3,500", price: "" },

          { name: "콜라(캔) pet", desc: "", price: "2,000원" },
          { name: "사이다(칠성) pet", desc: "", price: "2,000원" },
        ],
        note: "※ HOT/ICE 표기 없는 음료는 기본 ICE 기준이에요."
      },

      set: {
        title: "🎁 세트메뉴",
        subtitle: "세트 구성",
        items: [
          { name: "아메리칸 핫도그 + 음료", desc: "", price: "6,500원~" },
          { name: "수제 타코야끼(12알) + 음료", desc: "", price: "8,500원~" },
          { name: "아메리칸 핫도그 + 수제 타코야끼(8알) + 음료", desc: "", price: "11,000원~" },
        ],
        note: "※ ‘~’ 표시는 선택 메뉴에 따라 가격이 달라질 수 있어요."
      }
    };

    const tabs = document.querySelectorAll(".tab");
    const panel = document.getElementById("panel");

    function render(key){
      const data = MENU[key];
      panel.innerHTML = `
        <div class="panel-head">
          <h2>${data.title}</h2>
          <div class="sub">${data.subtitle}</div>
        </div>

        <div class="price-list">
          ${data.items.map(it => `
            <div class="row">
              <div class="left">
                <div class="item">${it.name}</div>
                ${it.desc ? `<div class="desc">${it.desc}</div>` : ``}
              </div>
              ${it.price ? `<div class="price">${it.price}</div>` : ``}
            </div>
          `).join("")}
        </div>

        <div class="note">${data.note}</div>
      `;
    }

    tabs.forEach(t => {
      t.addEventListener("click", () => {
        tabs.forEach(x => { x.classList.remove("active"); x.setAttribute("aria-selected","false"); });
        t.classList.add("active");
        t.setAttribute("aria-selected","true");
        render(t.dataset.tab);
      });
    });

    // 첫 화면(원하면 "tako"로 바꿔도 됨)
    render("hotdog");
  </script>
</body>
</html>
